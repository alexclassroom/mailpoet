  - core-js-pure

# Supply chain security: block packages published less than 24 hours ago.
# Excludes @wordpress, @woocommerce, @automattic — these are first-party
# packages we trust and need to install promptly.
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@wordpress/*'
  - '@woocommerce/*'
  - '@automattic/*'
